<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINGO BINGO GAME</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    padding:12px;
    font-family:'Poppins', sans-serif;
    background:#111;
    color:white;
    text-align:center;
    background:
        linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.65)),
        url('https://img.magnific.com/free-vector/red-abstract-geometric-shape-with-grid-line-pattern_1409-1890.jpg');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

h2{margin:0;font-size:24px;}

/* SWITCH */
.switcher{margin-top:10px;}
.switcher button{
    padding:8px 12px;
    margin:4px;
    border:none;
    border-radius:8px;
    background:#333;
    color:white;
    cursor:pointer;
}

/* GAME */
.game{display:none;}
.game.active{display:block;}

/* 🔥 PATTERN FIX (KEEP ALL VISIBLE) */
.patternsUI{
    display:grid;
    grid-template-columns:repeat(6, minmax(80px,1fr));
    gap:8px;
    max-width:500px;
    margin:10px auto;
}

/* pattern box */
.patternBox{
    background:rgba(255,255,255,0.08);
    border-radius:10px;
    padding:6px;
    font-size:8px;
    height:90px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
}

/* title */
.patternBox div:first-child{
    font-size:8px;
    font-weight:bold;
}

/* mini grid */
.patternGrid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:1px;
    width:55px;
    height:55px;
}

.pcell{
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.15);
    border-radius:2px;
}
.pcell.active{background:#ff2d2d;}

.patternBox.win{
    box-shadow:0 0 12px red;
    border:2px solid red;
}

/* BOARD */
.board{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:6px;
    max-width:520px;
    margin:12px auto;
}

.song{
    aspect-ratio:1/1;
    background:#222;
    border:none;
    border-radius:10px;
    color:white;
    font-size:clamp(9px,2.2vw,13px);
    font-weight:bold;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:4px;
}
.song.active{background:red;}

/* POPUP */
#popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:clamp(40px,7vw,80px);
    font-weight:bold;
    color:red;
    opacity:0;
    pointer-events:none;
    transition:0.2s;
}
#popup.show{opacity:1;}

.winName{
    color:white;
    text-shadow:0 0 10px black, 0 0 25px red;
}

/* CONFETTI */
canvas{
    position:fixed;
    top:0;
    left:0;
    pointer-events:none;
}
</style>
</head>

<body>

<h2>SINGO BINGO CARD</h2>

<div id="game1" class="game active">
    <div class="patternsUI" id="patterns1"></div>
    <div class="board" id="board1"></div>
</div>

<div id="game2" class="game">
    <div class="patternsUI" id="patterns2"></div>
    <div class="board" id="board2"></div>
</div>

<div class="switcher">
    <button onclick="showGame(1)">GAME 1</button>
    <button onclick="showGame(2)">GAME 2</button>
</div>

<div id="popup"></div>
<canvas id="confetti"></canvas>

<script>

const columns = [
["2012","Angel","APT","Ask For More","Baby","Basket Case","Beautiful Girls","Buttons","Cebuana","Celebration","Cherry On Top","Come On Over","Dahil Sayo","Dancing Queen","Danza Kuduro"],
["Doo Bi Doo","DUNGKA!","Espresso","Finesse","Fire","Fireball","Gangnam Style","Gasolina","GENTO","Get Down","Gikumot-Kumot","Girl In the Mirror","Girls Just Want to Have Fun","Give Me Everything","Gugmang Ga Aso-Aso"],
["Hips Dont Lie","Hot in Herre","Ilongga","Insomnia","I wanna Dance with Somebody","Kikay","Last Friday Night","Like A G6","Live While Where Young","Low","Man I Need","Marikit","Material Girl","Miss Independent","Modelong Charing"],
["Numb","On The Floor","Oohh Lala Baby","Party Rock Anthem","Prinsipal","Pump It","Raining in Manila","Salamin, Salamin","Sayaw Mga Choy","September","Seven","Shake It Off","Shots","Shout Out to My Ex","Single Ladies"],
["Sk8er Boi","Solo","Super Bass","Taki Taki","Tala","That's What You Get","Touch","Toxic","Uptown Girl","Waka Waka","Wannabe","We Like to Party!","What is Love?","Whine On","YMCA"]
];

/* ALL PATTERNS KEPT */
const patternsA = [
{name:"POST STAMP",cells:[3,4,8,9]},
{name:"CURSOR",cells:[0,1,2,5,6,10,12,18,24]},
{name:"LETTER X",cells:[0,4,6,8,12,16,18,20,24]},
{name:"CROSS",cells:[2,7,10,11,12,13,14,17,22]},
{name:"PEACE",cells:[2,7,12,16,17,18,20,22,24]},
{name:"FULL HOUSE",cells:[...Array(25).keys()]}
];

const patternsB = [
{name:"4 CORNERS",cells:[0,4,20,24]},
{name:"SMALL BOX",cells:[6,7,8,11,12,13,16,17,18]},
{name:"SEVEN",cells:[0,1,2,3,4,8,12,16,20]},
{name:"DIAMOND",cells:[2,6,8,10,14,16,18,22]},
{name:"LETTER I",cells:[0,1,2,3,4,7,12,17,20,21,22,23,24]},
{name:"FULL HOUSE",cells:[...Array(25).keys()]}
];

function createGame(boardId,patternId,patterns){

let active=new Set();
let triggered=new Set();
let patternBoxes=[];

function build(){
    const cols=columns.map(c=>[...c].sort(()=>Math.random()-0.5));
    let data=[];

    for(let r=0;r<5;r++){
        for(let c=0;c<5;c++){
            data.push(cols[c][r]);
        }
    }

    const board=document.getElementById(boardId);
    board.innerHTML="";

    data.forEach((val,i)=>{
        const btn=document.createElement("button");
        btn.className="song";
        btn.textContent=val;

        btn.onclick=()=>{
            if(active.has(i)){
                active.delete(i);
                btn.classList.remove("active");
            }else{
                active.add(i);
                btn.classList.add("active");
            }
            check();
        };

        board.appendChild(btn);
    });
}

function renderPatterns(){
    const box=document.getElementById(patternId);
    box.innerHTML="";
    patternBoxes=[];

    patterns.forEach((p,i)=>{
        const div=document.createElement("div");
        div.className="patternBox";

        const title=document.createElement("div");
        title.textContent=p.name;

        const grid=document.createElement("div");
        grid.className="patternGrid";

        for(let j=0;j<25;j++){
            const cell=document.createElement("div");
            cell.className="pcell";
            if(p.cells.includes(j)) cell.classList.add("active");
            grid.appendChild(cell);
        }

        div.appendChild(title);
        div.appendChild(grid);

        box.appendChild(div);
        patternBoxes.push(div);
    });
}

function check(){
    const selected=[...active];

    patterns.forEach((p,i)=>{
        if(p.cells.every(x=>selected.includes(x))){
            if(!triggered.has(p.name)){
                triggered.add(p.name);
                showWin(p.name);
                startConfetti();
                patternBoxes[i].classList.add("win");
            }
        }
    });
}

build();
renderPatterns();
}

function showGame(n){
document.getElementById("game1").classList.remove("active");
document.getElementById("game2").classList.remove("active");
document.getElementById("game"+n).classList.add("active");
}

function showWin(name){
const popup=document.getElementById("popup");
popup.innerHTML=`🔥 <span class="winName">${name}</span> 🔥`;
popup.classList.add("show");
setTimeout(()=>popup.classList.remove("show"),2500);
}

/* CONFETTI */
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let conf=[],run=false;

function startConfetti(){
conf=[];
run=true;

for(let i=0;i<150;i++){
conf.push({
x:Math.random()*canvas.width,
y:Math.random()*-canvas.height,
r:2+Math.random()*4,
c:`hsl(${Math.random()*360},100%,60%)`,
s:2+Math.random()*4
});
}

animate();

setTimeout(()=>{
run=false;
ctx.clearRect(0,0,canvas.width,canvas.height);
},3000);
}

function animate(){
if(!run)return;
ctx.clearRect(0,0,canvas.width,canvas.height);

conf.forEach(p=>{
ctx.fillStyle=p.c;
ctx.fillRect(p.x,p.y,p.r,p.r);
p.y+=p.s;
if(p.y>canvas.height)p.y=0;
});

requestAnimationFrame(animate);
}

createGame("board1","patterns1",patternsA);
createGame("board2","patterns2",patternsB);

</script>

</body>
</html>
