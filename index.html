<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINGO BINGO</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    padding:20px;
    font-family:'Poppins', sans-serif;
    background:#111;
    color:white;
    text-align:center;
    background:
        linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.65)),
        url('https://img.magnific.com/free-vector/red-abstract-geometric-shape-with-grid-line-pattern_1409-1890.jpg');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* HEADER */
h2{font-size:30px;margin:0;}

/* SWITCH */
.switcher{margin-top:20px;}
.switcher button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#333;
    color:white;
    cursor:pointer;
}

/* GAME */
.game{display:none;}
.game.active{display:block;}

/* BOARD */
.board{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:6px;
    max-width:500px;
    margin:auto;
}

.song{
    aspect-ratio:1/1;
    background:#222;
    color:white;
    border:none;
    border-radius:10px;
    font-size:clamp(10px,2.5vw,14px);
    font-weight:bold;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:4px;
}

.song.active{background:red;}

/* PATTERNS */
.patternsUI{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    margin:10px 0;
}

.patternBox{
    width:80px;
    height:80px;
    background:rgba(255,255,255,0.1);
    border-radius:8px;
    font-size:8px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
}

.patternGrid{
    display:grid;
    grid-template-columns:repeat(5,6px);
    gap:1px;
}

.pcell{
    width:6px;
    height:6px;
    background:rgba(255,255,255,0.2);
}
.pcell.active{background:red;}

.patternBox.win{
    border:2px solid red;
    box-shadow:0 0 10px red;
}

/* POPUP */
#popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:80px;
    color:red;
    opacity:0;
    pointer-events:none;
}
#popup.show{opacity:1;}

/* CONFETTI */
canvas{
    position:fixed;
    top:0;
    left:0;
    pointer-events:none;
}
</style>
</head>

<body>

<h2>SINGO BINGO CARD</h2>

<div id="game1" class="game active">
    <div class="patternsUI" id="patterns1"></div>
    <div class="board" id="board1"></div>
</div>

<div id="game2" class="game">
    <div class="patternsUI" id="patterns2"></div>
    <div class="board" id="board2"></div>
</div>

<div class="switcher">
    <button onclick="showGame(1)">GAME 1</button>
    <button onclick="showGame(2)">GAME 2</button>
</div>

<div id="popup"></div>
<canvas id="confetti"></canvas>

<script>
const columns = [
["2012","Angel","APT","Ask For More","Baby","Basket Case","Beautiful Girls","Buttons","Cebuana","Celebration","Cherry On Top","Come On Over","Dahil Sayo","Dancing Queen","Danza Kuduro"],
["Doo Bi Doo","DUNGKA!","Espresso","Finesse","Fire","Fireball","Gangnam Style","Gasolina","GENTO","Get Down","Gikumot-Kumot","Girl In the Mirror","Girls Just Want to Have Fun","Give Me Everything","Gugmang Ga Aso-Aso"],
["Hips Dont Lie","Hot in Herre","Ilongga","Insomnia","I wanna Dance with Somebody","Kikay","Last Friday Night","Like A G6","Live While Where Young","Low","Man I Need","Marikit","Material Girl","Miss Independent","Modelong Charing"],
["Numb","On The Floor","Oohh Lala Baby","Party Rock Anthem","Prinsipal","Pump It","Raining in Manila","Salamin, Salamin","Sayaw Mga Choy","September","Seven","Shake It Off","Shots","Shout Out to My Ex","Single Ladies"],
["Sk8er Boi","Solo","Super Bass","Taki Taki","Tala","That's What You Get","Touch","Toxic","Uptown Girl","Waka Waka","Wannabe","We Like to Party!","What is Love?","Whine Up","YMCA"]
];

const patternsA=[
{name:"X",cells:[0,4,6,8,12,16,18,20,24]},
{name:"CROSS",cells:[2,7,10,11,12,13,14,17,22]},
{name:"FULL",cells:[...Array(25).keys()]}
];

const patternsB=[
{name:"4 CORNERS",cells:[0,4,20,24]},
{name:"BOX",cells:[6,7,8,11,12,13,16,17,18]},
{name:"FULL",cells:[...Array(25).keys()]}
];

function createGame(boardId,patternId,patterns){

let active=new Set();
let triggered=new Set();
let patternBoxes=[];

function build(){
    const cols=columns.map(c=>[...c].sort(()=>Math.random()-0.5));
    let data=[];

    for(let r=0;r<5;r++){
        for(let c=0;c<5;c++){
            data.push(cols[c][r]);
        }
    }

    const board=document.getElementById(boardId);
    board.innerHTML="";

    data.forEach((val,i)=>{
        const btn=document.createElement("button");
        btn.className="song";
        btn.textContent=val;

        btn.onclick=()=>{
            if(active.has(i)){
                active.delete(i);
                btn.classList.remove("active");
            }else{
                active.add(i);
                btn.classList.add("active");
            }
            check();
        };

        board.appendChild(btn);
    });
}

function renderPatterns(){
    const box=document.getElementById(patternId);
    box.innerHTML="";
    patternBoxes=[];

    patterns.forEach((p,i)=>{
        const div=document.createElement("div");
        div.className="patternBox";

        const grid=document.createElement("div");
        grid.className="patternGrid";

        for(let j=0;j<25;j++){
            const cell=document.createElement("div");
            cell.className="pcell";
            if(p.cells.includes(j)) cell.classList.add("active");
            grid.appendChild(cell);
        }

        div.appendChild(document.createTextNode(p.name));
        div.appendChild(grid);

        box.appendChild(div);
        patternBoxes.push(div);
    });
}

function check(){
    const selected=[...active];

    patterns.forEach((p,i)=>{
        const win=p.cells.every(x=>selected.includes(x));

        if(win && !triggered.has(p.name)){
            triggered.add(p.name);
            showWin(p.name);
            startConfetti();
            patternBoxes[i].classList.add("win");
        }
    });
}

build();
renderPatterns();

}

function showGame(n){
document.getElementById("game1").classList.remove("active");
document.getElementById("game2").classList.remove("active");
document.getElementById("game"+n).classList.add("active");
}

function showWin(name){
const popup=document.getElementById("popup");
popup.innerHTML=name;
popup.classList.add("show");
setTimeout(()=>popup.classList.remove("show"),3000);
}

/* CONFETTI */
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let conf=[],run=false;

function startConfetti(){
conf=[];
run=true;

for(let i=0;i<120;i++){
conf.push({x:Math.random()*canvas.width,y:Math.random()*-canvas.height,r:3,c:`hsl(${Math.random()*360},100%,50%)`,s:2+Math.random()*3});
}

animate();
setTimeout(()=>{run=false;ctx.clearRect(0,0,canvas.width,canvas.height);},3000);
}

function animate(){
if(!run)return;
ctx.clearRect(0,0,canvas.width,canvas.height);

conf.forEach(p=>{
ctx.fillStyle=p.c;
ctx.fillRect(p.x,p.y,p.r,p.r);
p.y+=p.s;
if(p.y>canvas.height)p.y=0;
});

requestAnimationFrame(animate);
}

createGame("board1","patterns1",patternsA);
createGame("board2","patterns2",patternsB);
</script>

</body>
</html>
